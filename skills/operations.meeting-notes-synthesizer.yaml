# yaml-language-server: $schema=../docs/skill-schema.json
name: meeting-notes-synthesizer
version: 1
domain: operations
protocol_implements: [Analyzable]

description: >
  Transforms raw meeting transcripts, notes, or chat logs into structured meeting
  summaries with decisions, action items, open questions, and key discussion points.
  Assigns owners to action items when attendees are provided. Extracts implicit
  decisions and unresolved questions that participants may have overlooked.
  Fail-loudly: outputs "SYNTHESIS FAILURE" when transcript is missing or too
  fragmentary to extract meaningful content, and marks items as "[OWNER UNKNOWN]"
  when attendee list is absent.

inputs:
  transcript:
    type: string
    required: true
    description: Raw meeting notes, transcript, or chat log to synthesize
  meeting_type:
    type: string
    required: false
    description: "standup | sprint_planning | retrospective | design_review | decision_meeting | general (default: general)"
  attendees:
    type: string
    required: false
    description: List of participants for owner assignment on action items
  context:
    type: string
    required: false
    description: Project name, team context, sprint goals, or prior meeting notes for continuity

outputs_schema:
  type: object
  required: [summary, decisions, action_items, open_questions, key_points]
  properties:
    summary:
      type: string
      description: 3-5 sentence overview of what was discussed and the meeting outcome
    decisions:
      type: array
      description: Each decision as a structured item with the decision statement and rationale
    action_items:
      type: array
      description: Each action with assignee, deadline (if stated), and priority
    open_questions:
      type: array
      description: Unresolved items requiring follow-up, with suggested owner if determinable
    key_points:
      type: array
      description: Important discussion topics with positions taken by participants

capability_requirements:
  deep_analyst:
    needs: [long_context_reasoning, structured_output, information_extraction]
    context_window_min: 16k

parameters:
  transcript: "{{transcript}}"
  meeting_type: "general"
  attendees: ""
  context: ""

implementation:
  - name: synthesize
    type: llm_per_section
    model: "{{capability.deep_analyst}}"
    planning_prompt: |
      You are a meeting notes analyst. Produce a structured synthesis of the following meeting.

      Meeting type: {{parameters.meeting_type}}
      {{ if parameters.attendees != "" -}}
      Attendees: {{parameters.attendees}}
      {{ end -}}
      {{ if parameters.context != "" -}}
      Project/team context: {{parameters.context}}
      {{ end -}}

      Transcript / raw notes:
      ─────────────────────────────────────────────
      {{ if parameters.transcript == "" -}}
      MISSING — output "SYNTHESIS FAILURE: No transcript provided." and stop.
      {{ else -}}
      {{parameters.transcript}}
      {{ end -}}
      ─────────────────────────────────────────────

      Generate exactly these section titles (one per line, no numbering):
      Summary
      Decisions Made
      Action Items
      Open Questions
      Key Discussion Points

      Return ONLY the section titles, one per line.
    section_analysis_prompt: |
      You are a meeting notes analyst writing the "{{section_name}}" section.

      Meeting type: {{parameters.meeting_type}}
      {{ if parameters.attendees != "" -}}
      Attendees: {{parameters.attendees}}
      {{ end -}}
      {{ if parameters.context != "" -}}
      Project/team context: {{parameters.context}}
      {{ end -}}

      Transcript / raw notes:
      ─────────────────────────────────────────────
      {{ if parameters.transcript == "" -}}
      SYNTHESIS FAILURE: No transcript provided. Cannot produce meeting notes.
      {{ else -}}
      {{parameters.transcript}}
      {{ end -}}
      ─────────────────────────────────────────────

      {{blocks.data_integrity_rules_extraction}}

      ### {{section_name}}

      {{ if section_name == "Summary" -}}
      Write 3-5 sentences capturing:
      - The primary purpose of the meeting
      - The most important outcome or decision
      - Overall tone (productive, contentious, inconclusive)
      - Key participants who drove discussion (if identifiable from transcript)

      Calibrate for meeting type "{{parameters.meeting_type}}":
      - standup: focus on blockers and commitments
      - sprint_planning: focus on scope and capacity decisions
      - retrospective: focus on improvement actions agreed
      - design_review: focus on architectural decisions and trade-offs
      - decision_meeting: focus on what was decided and what was deferred
      - general: balanced summary

      {{ else if section_name == "Decisions Made" -}}
      For each decision made during the meeting:
      - **Decision**: [Clear statement of what was decided]
        - **Rationale**: [Why this was chosen, including alternatives considered if discussed]
        - **Decided by**: [Who made or approved the decision, or "[Implicit consensus]"]
        - **Scope**: [What this decision affects]

      If no decisions were made, write: "No explicit decisions were recorded in this meeting."

      IMPORTANT: A decision MUST have been explicitly agreed upon or clearly concluded.
      Ongoing discussions without resolution are NOT decisions — they belong in Open Questions.

      {{ else if section_name == "Action Items" -}}
      Present action items in table format:

      | # | Action | Owner | Deadline | Priority |
      |---|--------|-------|----------|----------|

      Rules for extraction:
      - Owner: Use the attendee name from the transcript. If no owner was assigned, write "[OWNER UNKNOWN]".
      {{ if parameters.attendees != "" -}}
      - Cross-reference owners against the attendees list: {{parameters.attendees}}
      {{ end -}}
      - Deadline: Use the exact date/timeframe stated. If none stated, write "[No deadline stated]".
      - Priority: HIGH (blocking other work or explicitly urgent), MEDIUM (committed to this period),
        LOW (nice-to-have or exploratory). If priority was not discussed, write "[Not prioritized]".

      Include implicit action items (e.g., "I'll look into that" = action item for that speaker).

      If no action items were identified, write: "No action items were identified in this meeting."

      {{ else if section_name == "Open Questions" -}}
      For each unresolved item:
      - **Question**: [What needs to be answered or decided]
        - **Raised by**: [Who raised it, or "[Unknown]"]
        - **Suggested owner**: [Best person to follow up, based on discussion context]
        - **Why it matters**: [Impact of leaving this unresolved]

      Include:
      1. Questions explicitly asked but not answered
      2. Topics where discussion ended without agreement
      3. Dependencies on external information or absent stakeholders
      4. Items explicitly deferred ("let's take that offline", "we'll revisit next week")

      {{ else if section_name == "Key Discussion Points" -}}
      For each significant topic discussed:
      - **Topic**: [Subject of discussion]
        - **Positions**: [Who said what — summarize each distinct viewpoint]
        - **Outcome**: [Resolved / Partially resolved / Unresolved]
        - **Time spent**: [Rough indication: brief mention / moderate discussion / extended debate]

      Focus on topics where:
      - Multiple viewpoints were expressed
      - Trade-offs were weighed
      - Significant information was shared
      - Disagreements surfaced (even if resolved)

      Do NOT list routine status updates unless they sparked meaningful discussion.
      {{ end -}}

      {{blocks.no_preamble}}

      ### GATE_SIGNAL
      SIGNAL: [COMPLETE | PARTIAL_NOTES | INSUFFICIENT_INPUT]
      RATIONALE: [one sentence — e.g., "All sections extracted with high confidence from detailed transcript" or "Transcript too fragmentary to identify owners for 4 of 6 action items"]
