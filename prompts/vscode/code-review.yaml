name: code-review
version: 2
domain: vscode
source_tag: vscode

description: >
  Review code for bugs, security issues, performance, and style.
  Returns structured JSON issues suitable for the VSCode Problems panel,
  followed by a markdown summary.

model_preference:
  primary: ollama/deepseek-coder-v2:16b@workstation
  fallback: ollama/qwen2.5-coder:7b-instruct-q4_K_M@mini

variables:
  severity_threshold: low
  focus_areas:
    - bugs
    - security
    - performance
    - readability
  language: "{{detected_language}}"
  max_issues: 20

prompt_template: |
  Review the following {{language}} code.

  File: {{file_path}}
  Focus areas: {{focus_areas | array.join ", "}}
  Report issues at severity {{severity_threshold}} and above.

  ```{{language}}
  {{code}}
  ```

  For each issue found, output a JSON array:
  [
    {
      "file": "{{file_path}}",
      "line": <line_number>,
      "severity": "low|medium|high|critical",
      "category": "bug|security|performance|style|readability",
      "message": "<description>",
      "suggestion": "<fix or improvement>"
    }
  ]

  If no issues found, return empty array [].

  After the JSON, provide a brief summary paragraph.

output:
  format: json+markdown
  integrate: problems_panel
