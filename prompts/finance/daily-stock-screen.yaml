name: daily-stock-screen
version: 3
domain: finance
source_tag: finance_daily
schedule: "0 18 * * 1-5"

description: >
  Screen watchlist for stocks dropping >threshold%, run multi-model analysis
  (fundamental, technical, sentiment) across the cluster, synthesize report.

model_preference:
  orchestrator: local
  subtasks:
    fundamental: ollama/qwen2.5:7b-instruct-q4_K_M@mini
    technical: ollama/deepseek-coder:6.7b@edge
    sentiment: ollama/qwen2.5:7b-instruct-q4_K_M@mini

variables:
  drop_threshold: "5"
  max_stocks: "10"

data_collection:
  steps:
    - name: load_watchlist
      type: read_file
      source: "~/data/watchlist.csv"
      output_var: watchlist

    - name: fetch_prices
      type: web_api_batch
      source: "https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?range=5d&interval=1d"
      iterate_over: "{{watchlist}}"
      output_var: price_data

    - name: filter_drops
      type: filter
      input: "{{price_data}}"
      condition: "pct_change <= -{{drop_threshold}}"
      limit: "{{max_stocks}}"
      output_var: dropped_stocks

    - name: fetch_news
      type: web_search_batch
      query: "{symbol} stock news {{date}}"
      iterate_over: "{{dropped_stocks}}"
      output_var: news_data

subtasks:
  - name: fundamental
    model: "{{model_preference.subtasks.fundamental}}"
    input_vars: [dropped_stocks, price_data]
    prompt_template: |
      Analyze fundamentals for these stocks that dropped today:
      {{dropped_stocks}}

      Price data: {{price_data}}

      For each stock provide JSON:
      {
        "symbol": "...",
        "pe_ratio": ...,
        "revenue_trend": "growing|flat|declining",
        "profit_margins": ...,
        "debt_to_equity": ...,
        "outlook": "bullish|neutral|bearish",
        "reasoning": "..."
      }

  - name: technical
    model: "{{model_preference.subtasks.technical}}"
    input_vars: [dropped_stocks, price_data]
    prompt_template: |
      Analyze technicals for these stocks:
      {{dropped_stocks}}

      5-day price history: {{price_data}}

      For each stock provide JSON:
      {
        "symbol": "...",
        "support_level": ...,
        "resistance_level": ...,
        "rsi_14": ...,
        "volume_vs_avg": "above|normal|below",
        "trend": "uptrend|downtrend|sideways",
        "signal": "buy|hold|sell"
      }

  - name: sentiment
    model: "{{model_preference.subtasks.sentiment}}"
    input_vars: [dropped_stocks, news_data]
    prompt_template: |
      Analyze market sentiment from recent news:
      {{news_data}}

      Stocks in focus: {{dropped_stocks}}

      For each stock provide JSON:
      {
        "symbol": "...",
        "news_sentiment": "positive|neutral|negative",
        "key_headlines": ["..."],
        "analyst_actions": ["..."],
        "catalyst": "..."
      }

synthesis:
  prompt_template: |
    # Daily Stock Screen — {{date}}

    Combine these analyses for stocks that dropped >{{drop_threshold}}% today.

    Fundamental: {{fundamental_result}}
    Technical: {{technical_result}}
    Sentiment: {{sentiment_result}}

    For each stock, write a concise investment summary:
    1. Why it dropped (one sentence)
    2. Is this an opportunity or a warning sign?
    3. Key levels to watch
    4. Recommended action: BUY / HOLD / AVOID with confidence level

    End with a portfolio-level summary: overall market read, any sector patterns.
    Output as clean markdown.

output:
  format: markdown
  destination: "~/reports/finance/{{date}}-daily-screen.md"
  notify: true
