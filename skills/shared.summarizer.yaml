# yaml-language-server: $schema=../docs/skill-schema.json
name: summarizer
version: 1
domain: shared

description: >
  Compresses a large text (context file, prior report, search results) into a focused
  summary before passing it into downstream analysis skills. Reduces token usage
  when context is large. Generic — usable in any domain.

inputs:
  content:
    type: string
    required: true
    description: The text to summarise
  focus:
    type: string
    required: false
    description: What aspects to emphasise in the summary
  max_length:
    type: string
    required: false
    description: Target summary length guidance (e.g. "200 words", "3 paragraphs")

outputs_schema:
  type: string
  description: A focused summary of the input content in plain markdown prose.

capability_requirements:
  fast_general:
    needs: [instruction_following, long_context_understanding]
    context_window_min: 16k

parameters:
  focus: "key facts, numbers, and named entities"
  max_length: "300 words"
  redact_pii: ""
  output_var: summary

implementation:
  - name: summarise
    type: llm_per_section
    model: "{{capability.fast_general}}"
    max_sections: "1"
    output_var: "{{parameters.output_var}}"
    section_title: "Summary"
    section_analysis_prompt: |
      {{ if parameters.content == "" }}SUMMARY FAILURE: No content provided. Cannot summarize.{{ end }}
      Summarise the following content in approximately {{parameters.max_length}}.
      Focus on: {{parameters.focus}}

      Do not add analysis or opinion — only summarise what is present in the source.
      {{ if parameters.redact_pii != "" -}}
      PII REDACTION MODE: Replace all personal names with [PERSON], email addresses with [EMAIL], phone numbers with [PHONE], and physical addresses with [ADDRESS].
      {{ end -}}
      Start immediately — no preamble.

      Content:
      ---
      {{parameters.content}}
      ---
