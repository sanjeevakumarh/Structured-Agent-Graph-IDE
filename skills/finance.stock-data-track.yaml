# yaml-language-server: $schema=../docs/skill-schema.json
name: stock-data-track
version: 1
domain: finance
protocol_implements: [Collectible]

description: >
  Two-phase data collection: (1) deterministic fetch of known finance pages
  (Yahoo Finance quote + statistics), then (2) LLM-planned search queries for
  competitive landscape, news, and analyst opinions.
  The primary data-gathering primitive for financial analysis workflows.

inputs:
  ticker:
    type: string
    required: true
    description: Stock ticker symbol (e.g. KO, AAPL, MSFT)
  exchange:
    type: string
    required: false
    description: "Exchange prefix for unambiguous search (e.g. NASDAQ, NYSE). Used to form 'NASDAQ: COIN' style queries that avoid crypto/keyword confusion."
  asset_type:
    type: string
    required: false
    description: "stock | etf — prompts adapt accordingly (default: stock)"
  fund_name:
    type: string
    required: false
    description: "Full fund/company name for search disambiguation (e.g. 'US Global Jets Fund', 'VanEck Semiconductor ETF'). Critical for ETFs with ambiguous tickers."
  context:
    type: string
    required: false
    description: Analyst lens — drives query framing and thesis tailoring
  max_results:
    type: integer
    required: false
    description: Max search results per query (default 5)

outputs_schema:
  type: string
  description: >
    Three separate vars: yahoo_quote_data (quote page), stockanalysis_data
    (income statement), search_results (discovery queries with page content).
    Consumers should reference all three vars directly.

capability_requirements:
  fast_general:
    needs: [instruction_following, structured_output]
    context_window_min: 8k

parameters:
  ticker: "{{ticker}}"
  exchange: ""
  asset_type: "stock"
  fund_name: ""
  context: "General investor"
  max_results: "8"
  output_var: all_search_results

implementation:
  # ── Phase 1: Deterministic fetch — known URLs, no search needed ──────────
  # These pages have structured financial data (price, P/E, revenue, balance sheet).
  - name: direct_data
    type: web_fetch
    source: "https://finance.yahoo.com/quote/{{parameters.ticker | string.upcase}}/"
    max_chars_per_page: 4000
    output_var: yahoo_quote_data

  - name: direct_stats
    type: web_fetch
    source: "https://stockanalysis.com/{{ if parameters.asset_type == 'etf' }}etf{{ else }}stocks{{ end }}/{{parameters.ticker | string.upcase}}/financials/"
    max_chars_per_page: 4000
    output_var: stockanalysis_data

  # ── Phase 2: LLM-planned search — discovery queries for non-deterministic data ──
  - name: search
    type: llm_queries
    model: "{{capability.fast_general}}"
    planning_prompt: |
      You are planning web search queries for {{parameters.asset_type}} research.
      Ticker: {{parameters.ticker | string.upcase}}
      Asset type: {{parameters.asset_type}}
      {{ if parameters.fund_name != "" -}}
      Full name: {{parameters.fund_name}}
      {{- end }}
      Context: {{parameters.context}}
      Today: {{today}} (week of {{current_week}})

      NOTE: We already have quote data and financial statements from Yahoo Finance
      and StockAnalysis. Do NOT search for basic price, P/E, revenue, or earnings data.

      Generate exactly 6 search queries across these tracks:

      Track 1 — Competitive landscape (2 queries): competitors, market share, sector comparison
      Track 2 — News & catalysts (2 queries): recent news, upcoming events, earnings calls
      Track 3 — Analyst opinions (1 query): ratings, price targets, upgrades/downgrades
      Track 4 — Technical indicators (1 query): RSI, MACD, moving averages, support/resistance

      ## QUERY FORMAT RULES
      1. Each query MUST be SHORT: 5-9 words maximum.
      2. ALWAYS use the TICKER (e.g. "MSFT") not the full company name.
         "Microsoft Corporation stock" returns microsoft.com homepage.
         "MSFT stock" returns finance sites.
      {{ if parameters.fund_name != "" -}}
         Exception: for ambiguous tickers, add "{{parameters.fund_name}}" to disambiguate.
      {{- end }}
      3. Use simple concrete terms. AVOID jargon: "price action", "trends", "analysis",
         "outlook", "valuation multiples" are filler words.
      4. NEVER use "site:", "NASDAQ:", or "NYSE:" prefixes.
      5. Put the ticker FIRST in every query.

      ## GOOD examples:
      - "MSFT stock competitors market share"
      - "MSFT stock news this week"
      - "MSFT stock price target upgrade"
      - "MSFT stock RSI MACD"
      - "KO stock sector comparison peers"
      - "NVDA stock earnings call guidance"

      ## BAD examples:
      - "MSFT yahoo finance quote" ← we already have this data, don't search for it
      - "MSFT stock P/E ratio revenue" ← we already have this from Yahoo Finance
      - "Microsoft Corporation stock price" ← full company name returns homepage
      - "analyst ratings MSFT" ← "analyst" first → dictionary definition

      Return ONLY a JSON array of exactly 6 strings — no explanation:
      ["query1", "query2", "query3", "query4", "query5", "query6"]
    limit: "{{parameters.max_results}}"
    fetch_pages: 2
    max_chars_per_page: 3000
    output_var: search_results

  # No combine step — yahoo_quote_data, stockanalysis_data, and search_results
  # are passed as separate vars to downstream consumers. An LLM combine step
  # was lossy (compressed 49KB → 1.2KB, losing all financial data).
