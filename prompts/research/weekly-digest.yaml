name: weekly-digest
version: 3
domain: research
source_tag: research_weekly
schedule: "0 9 * * 1"

description: >
  Fully dynamic weekly research digest. Set `topic` and `context` — the LLM
  determines what 5 sections are actually relevant for your specific topic and
  perspective, then researches and writes each one. No hardcoded section names.

model_preference:
  orchestrator: workstation
  subtasks:
    assembler: ollama/qwen2.5:14b-instruct-q5_K_M@workstation
    analyst:   ollama/qwen2.5:14b-instruct-q5_K_M@workstation
    planning:  ollama/qwen2.5:14b-instruct-q5_K_M@workstation

# ── Variables ────────────────────────────────────────────────────────────────
# Override via POST /api/prompts/research/weekly-digest/run
# Body: { "topic": "Microsoft stock outlook", "context": "I am a tech investor..." }
variables:
  topic: "Learn AI In C#"

  context: >
    All aspects of model development, training, inference, and techniques like gradient descent and math.
    I want to do it over 45 days with each day 30-45 minutes, a real world problem that teaches basics, math, but doable as a side project with constraints in hardward, software and skills.

  context_file: "~/projects/context/RESEARCH_CONTEXT.md"

  max_results: "5"
  output_subdir: "research"

# ── Data collection ──────────────────────────────────────────────────────────
data_collection:
  steps:
    # Step 1: generate topic-specific search queries and execute them
    - name: plan_and_search
      type: llm_queries
      model: "{{model_preference.subtasks.planning}}"
      planning_prompt: |
        You are planning web searches for a research digest.
        Topic: {{topic}}
        Reader context: {{context}}
        Today: {{date}}

        Generate exactly 10 targeted web search queries to gather comprehensive,
        recent information about this topic from the reader's perspective.

        Cover the full range of what this reader needs — consider: recent events,
        key metrics, expert opinions, market movements, technical developments,
        major players, trends — whatever is most relevant for THIS specific topic
        and THIS reader's stated context.

        Rules:
        - Tailor EVERY query specifically to "{{topic}}" — no generic filler
        - Include "{{date}}" or the current year in at least 3 queries for recency
        - Reflect the reader's context when choosing search angles

        Return ONLY a valid JSON array of exactly 10 strings. No explanation, no markdown:
        ["query1", "query2", "query3", "query4", "query5", "query6", "query7", "query8", "query9", "query10"]
      limit: "{{max_results}}"
      output_var: all_search_results

    # Step 2: load personal context file (silent no-op if file missing)
    - name: load_personal_context
      type: read_file
      source: "{{context_file}}"
      output_var: personal_context

    # Step 3: ask LLM what 5 sections are needed, then write each one in parallel
    - name: dynamic_sections
      type: llm_per_section
      model: "{{model_preference.subtasks.analyst}}"
      max_sections: "5"
      search_results_var: all_search_results

      # Phase 1 prompt: LLM decides which 5 sections this report needs
      planning_prompt: |
        You are planning a research report for a specific reader.
        Topic: {{topic}}
        Reader context: {{context}}

        Based on this topic and this reader's background and goals, identify the
        5 most relevant and actionable sections for this report.

        Ask yourself: what data points does this reader actually need?
        What decisions will they make based on this report?
        What would be most valuable given their stated context?

        DO NOT default to generic academic sections ("Notable Papers",
        "Tools & Frameworks", "Recent Developments") unless they are genuinely
        the most important thing for THIS specific topic AND reader context.

        Examples of appropriate sections by context:
        - Topic: Microsoft stock + Reader: tech investor
          Sections: "Revenue & Earnings Outlook", "AI Strategy & Competitive Position",
            "Analyst Ratings & Price Targets", "Key Risk Factors", "Investment Thesis"
        - Topic: edge AI hardware + Reader: embedded engineer
          Sections: "New Chips & SoCs", "Performance Benchmarks", "SDK & Framework Support",
            "Power & Thermal Constraints", "Migration from Current Hardware"
        - Topic: clinical oncology trial + Reader: oncologist
          Sections: "Trial Outcomes & Endpoints", "Safety & Adverse Events",
            "Patient Selection Criteria", "Comparison to Standard of Care",
            "Regulatory & Approval Status"

        Return ONLY a valid JSON array of exactly 5 section title strings. No explanation:
        ["Section 1", "Section 2", "Section 3", "Section 4", "Section 5"]

      # Phase 2 prompt: runs once per section in parallel
      section_analysis_prompt: |
        You are writing the "{{section_name}}" section of a research report.
        Topic: {{topic}}
        Reader context: {{context}}
        Date: {{date}}
        Personal notes: {{personal_context}}

        Source material (web search results):
        ---
        {{search_results}}
        ---

        Write a focused 200-300 word analysis of "{{section_name}}".
        - Use specific data: numbers, dates, names, quotes from sources where available
        - Focus on what matters most given the reader's stated context
        - If the source material lacks good data for this section, state that briefly
          and note what is available
        - Start directly with your analysis — no preamble, no meta-commentary

      output_var: section_analyses

# ── Subtasks ─────────────────────────────────────────────────────────────────
# Single assembler subtask: wraps the dynamic sections into a complete report
subtasks:
  - name: assembler
    model: "{{model_preference.subtasks.assembler}}"
    input_vars: [section_analyses, personal_context, context]
    prompt_template: |
      You are assembling a final research digest report.
      Topic: {{topic}}
      Date: {{date}}
      Reader: {{context}}

      The following analysis sections were written by domain analysts.
      READ THEM CAREFULLY — assemble, do not rewrite or summarize.

      {{section_analyses}}

      ASSEMBLE THE FINAL REPORT:

      1. First line: # {{topic}} — Research Digest ({{date}})
      2. ## Executive Summary
         3-5 sentences: the key insights and what they mean for this reader.
      3. Include each analysis section verbatim with its ## heading, in order.
      4. ## Action Items
         3-5 numbered, concrete actions the reader should take based on this report.
         Tailor these specifically to the reader's stated context and goals.
      5. ## Sources
         Every URL mentioned across all sections, as a numbered list:
         N. [Description or title](url)

      STRICT OUTPUT RULES:
      - Output ONLY clean Markdown — no JSON, no instructions, no meta-commentary
      - Include the analysis sections verbatim — do not rewrite or summarize them
      - Every URL from the sections must appear exactly once in Sources

# ── Synthesis ─────────────────────────────────────────────────────────────────
synthesis:
  prompt_template: |
    {{assembler_result}}

output:
  format: markdown
  destination: "~/reports/{{output_subdir}}/{{date}}-weekly.md"
  notify: true
