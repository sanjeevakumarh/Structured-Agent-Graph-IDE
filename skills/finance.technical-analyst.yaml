# yaml-language-server: $schema=../docs/skill-schema.json
name: technical-analyst
version: 2
domain: finance
protocol_implements: [Analyzable]

description: >
  Performs technical chart analysis: trend structure, momentum indicators (RSI, MACD),
  moving averages, volume, support/resistance, and chart patterns. Produces a structured
  section with a Technical Signal at the end.

inputs:
  search_results:
    type: string
    required: true
  ticker:
    type: string
    required: false
  asset_type:
    type: string
    required: false
  context:
    type: string
    required: false
    description: Investment thesis or analytical focus for the investor

outputs_schema:
  type: string
  description: >
    Markdown analysis covering Trend & Price Structure, Momentum Indicators, Moving Averages,
    Volume Analysis, Support & Resistance, Chart Patterns, ending with:
    **Signal: BULLISH / NEUTRAL / BEARISH** — one sentence rationale.

capability_requirements:
  deep_analyst:
    needs: [deep_reasoning, financial_analysis]
    context_window_min: 16k

parameters:
  output_var: technical_result

implementation:
  - name: analyse
    type: llm_per_section
    model: "{{capability.deep_analyst}}"
    max_sections: "1"
    output_var: "{{parameters.output_var}}"
    section_title: "Technical Analysis"
    section_analysis_prompt: |
      {{ if parameters.search_results == "" }}ANALYSIS FAILURE: No search results provided for technical analysis. Cannot proceed.{{ end }}
      Ticker: {{parameters.ticker | string.upcase}} ({{parameters.asset_type}})
      Analyst context: {{parameters.context}}
      Date: {{date}}

      Source material:
      ---
      {{parameters.search_results}}
      ---

      {{blocks.data_integrity_rules}}

      You are a technical analyst. Write a focused technical analysis using these sub-headings.
      {{blocks.no_preamble}}

      ### Trend & Price Structure
      Current trend direction, recent swing highs/lows, distance from 52-week high/low.

      ### Momentum Indicators
      RSI (14-day), MACD line vs signal line — overbought, oversold, or neutral?

      ### Moving Averages
      Price vs 50-day and 200-day MA. Any golden cross or death cross in effect?

      ### Volume Analysis
      Recent volume vs 30-day average. Signs of accumulation or distribution?

      ### Support & Resistance
      Three key support levels and three resistance levels with specific price points.

      ### Chart Patterns
      Any active formations: flags, wedges, head-and-shoulders, cup-with-handle, base, etc.

      For every indicator and price level, cite the specific number from source material.
      If an indicator is absent from sources, write "Data unavailable" — do NOT estimate.

      **Signal: BULLISH / NEUTRAL / BEARISH** — one sentence rationale.

      ### GATE_SIGNAL
      SIGNAL: [BULLISH | NEUTRAL | BEARISH | INSUFFICIENT_DATA]
      RATIONALE: [one sentence citing the dominant indicator]
