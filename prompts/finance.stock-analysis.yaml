# yaml-language-server: $schema=../docs/prompt-schema.json
name: stock-analysis
version: 2
domain: finance
source_tag: finance_analysis

description: >
  On-demand deep-dive for any stock or ETF: technical analysis, fundamental/portfolio-structure
  analysis, competitive landscape, and investment thesis. Includes scoring gates,
  bull/base/bear cases with probability estimates, PEG validation, cyclical analysis,
  structured risk matrix, and ETF-specific portfolio structure analysis.
  No schedule — trigger manually from the web UI or
  POST /api/prompts/finance/stock-analysis/run with ticker + context.

model_preference:
  orchestrator: ollama/qwen2.5:14b-instruct-q5_K_M@workstation
  subtasks:
    # Fast structured-output model for query planning
    planner:   ollama/qwen2.5:14b-instruct-q5_K_M@workstation
    # Strong local model for the four parallel analysis sections
    analyst:   ollama/qwen2.5:14b-instruct-q5_K_M@workstation
    # Frontier model for final assembly — coherence + writing quality matter here
    assembler: ollama/qwen2.5:14b-instruct-q5_K_M@workstation

# ── Variables ─────────────────────────────────────────────────────────────────
# Override any of these via POST body when running from the web UI:
#   { "ticker": "ko", "context": "food and beverage market impact due to ozempic" }
variables:
  ticker: "ko"

  # Exchange prefix for unambiguous search — avoids ticker/keyword collisions.
  # Set to the listing exchange (NASDAQ, NYSE, AMEX, etc.) when the ticker
  # is a common word or crypto term (e.g. COIN, HOOD, DASH, OPEN, REAL).
  # Leave blank for unambiguous tickers like AAPL, MSFT, KO.
  exchange: ""

  # stock | etf — prompts adapt their instructions accordingly
  asset_type: "stock"

  # Your analytical lens — drives query framing and thesis tailoring
  context: >
    General investor. Interested in medium-term (3-12 month) opportunities.
    Moderate risk tolerance. Dividend-paying equities and sector rotation plays.

  # Optional: personal investment notes file (silent no-op if missing)
  context_file: "~/projects/context/INVESTMENT_CONTEXT.md"

  max_results: "8"
  output_subdir: "finance"
  analyst_model_override: ""
  assembler_model_override: ""

# ── Skill object: stock data track ─────────────────────────────────────────────
objects:
  - name: stock_data
    skill: finance/stock-data-track
    args:
      ticker: "{{ticker}}"
      exchange: "{{exchange}}"
      asset_type: "{{asset_type}}"
      context: "{{context}}"
      max_results: "{{max_results}}"
      output_var: all_search_results

# ── Workflow: collect stock data ────────────────────────────────────────────────
workflow:
  - call: stock_data.collect

# ── Data collection ────────────────────────────────────────────────────────────
data_collection:
  steps:
    # Step 1 — Load personal investment notes (silent no-op if file missing)
    - name: load_personal_context
      type: read_file
      source: "{{context_file}}"
      output_var: personal_context

    # Step 3 — Run all four analysis sections in parallel via llm_per_section.
    # The planning prompt returns exactly the 4 section titles; each section then
    # receives a tailored analysis prompt routed by {{section_name}}.
    - name: run_analyses
      type: llm_per_section
      model: '{{ if analyst_model_override != "" }}{{analyst_model_override}}{{ else }}{{model_preference.subtasks.analyst}}{{ end }}'
      max_sections: "4"
      search_results_var: all_search_results
      output_var: section_analyses

      # Phase 1: return exactly these 4 titles in this order (no variation)
      planning_prompt: |
        Return exactly this JSON array — no changes to the titles, no explanation:
        ["Technical Analysis", "Fundamental Analysis", "Competitive Landscape", "Investment Thesis"]

      # Phase 2: runs once per section title in parallel.
      # Scriban conditionals route to the right instructions for each section.
      section_analysis_prompt: |
        Ticker: {{ticker_upper}} ({{asset_type}})
        Analyst context: {{context}}
        Date: {{date}}
        Personal notes: {{personal_context}}

        ## DATA RULES (apply to EVERY section)
        1. Copy numbers VERBATIM from the source material below. Search snippets are
           abbreviated — "P/E Ratio of 22.5" or "RSI...is 54" IS valid data. Extract and use it.
        2. Only write "[DATA UNAVAILABLE]" for a metric when NO snippet mentions it.
           Use this exact marker — not "Data unavailable" or "[DATA MISSING]".
        3. DO NOT use training knowledge to fill gaps. DO NOT fabricate numbers.
        4. Start directly with the first sub-heading; no preamble or commentary.
        5. VERIFY before writing: if you state "price is above 50-day MA of $X",
           confirm that the current price you stated is actually > $X.

        ## FORMATTING RULES
        - The sub-headings below are INSTRUCTIONS telling you what to write.
          Write your own analytical prose under each heading.
          DO NOT copy instruction sentences into your output.
        - Every "[DATA UNAVAILABLE]" metric still gets its own bullet or line — do not skip it.

        Regulatory context: ONLY if {{context}} explicitly names a specific bill, act, or regulation
        (e.g. "CLARITY Act", "SEC market structure reform"), add a "Regulatory Lens" subsection.
        If the context does NOT mention any specific legislation, do NOT add a Regulatory Lens subsection
        and do NOT invent or assume any regulatory developments.

        Source material (web search results):
        ---
        {{search_results}}
        ---

        STEP 1 — SCAN: Before writing anything, read every search snippet above and
        list the numbers you find (prices, percentages, ratios, volumes, dates,
        revenue, EPS, etc.). Search snippets are SHORT — a number like "54.437" in a
        snippet that says "RSI...is 54.437" IS valid source data. Use it.

        {{ if section_name == "Technical Analysis" }}
        You are a technical analyst. Write a focused technical analysis using the sub-headings below.
        SCOPE: Write ONLY about technical/price analysis. Do NOT write about fundamentals,
        investment thesis, bull/bear/base cases, catalysts, risk matrices, or conviction levels.
        Do NOT output a "Signals At A Glance" table.
        STRICT: If an exact RSI or MACD value is not stated in the source snippets, write
        "[DATA UNAVAILABLE]" — do NOT write "likely", "probably", or "around".
        {{ if asset_type == "etf" -}}

        ### ETF Type Classification
        Identify which type this ETF is: Passive index tracker / Smart beta / Active strategy /
        Leveraged / Covered call / Inverse.
        State how the type affects technical weighting (e.g. leverage decay distorts moving averages;
        reduce technical signal weight for leveraged and inverse ETFs accordingly).

        ### Trend & Price Structure
        Current trend direction, recent swing highs/lows, distance from 52-week high/low.

        ### Momentum Indicators
        RSI (14-day), MACD — signals adjusted for ETF type (lower weight for leveraged/inverse).

        ### Moving Averages
        Price vs 50-day and 200-day MA. Golden cross or death cross in effect?

        ### Volume Analysis
        Recent volume vs 30-day average. Signs of accumulation or distribution?

        ### Correlation & Overlap
        - Correlation vs SPY: positive / negative / uncorrelated (estimate from sector/theme)
        - Overlap vs QQQ: % of holdings in common (estimated)
        - Overlap vs user portfolio: reference personal notes if specific holdings are mentioned

        ### Support & Resistance
        Three key support levels and three resistance levels with specific price points.

        ### Technical Signal
        Technical Score: [+1 = BULLISH | 0 = NEUTRAL | -1 = BEARISH]
        **Score: [write exactly +1, 0, or -1 — no other values]**
        **Signal: BULLISH / NEUTRAL / BEARISH** — one sentence rationale.

        ### Context Impact
        In 2-3 sentences, state how "{{context}}" influences the technical setup (e.g., liquidity, regulatory catalysts, event risk).

        ### Regulatory Lens
        If a bill/regulation is in context, specify how approval/rejection would alter technical levels, volume, or volatility; include trigger prices or volume thresholds.

        {{- else }}
        ### Trend & Price Structure
        Current trend direction, recent swing highs/lows, distance from 52-week high/low.

        ### Momentum Indicators
        RSI (14-day), MACD line vs signal line — overbought, oversold, or neutral?

        ### Moving Averages
        Price vs 50-day and 200-day MA. Any golden cross or death cross in effect?

        ### Volume Analysis
        Recent volume vs 30-day average. Signs of accumulation or distribution?

        ### Support & Resistance
        Three key support levels and three resistance levels with specific price points.

        ### Chart Patterns
        Any active formations: flags, wedges, head-and-shoulders, cup-with-handle, base, etc.

        ### Technical Signal
        Technical Score: [+1 = BULLISH | 0 = NEUTRAL | -1 = BEARISH]
        **Score: [write exactly +1, 0, or -1 — no other values]**
        **Signal: BULLISH / NEUTRAL / BEARISH** — one sentence rationale.

        {{ end -}}
        {{ else if section_name == "Fundamental Analysis" }}
        {{ if asset_type == "etf" -}}
        You are an ETF analyst. Write a Portfolio Structure Analysis.

        ### Portfolio Structure
        List top 10 holdings with their % weight allocation.
        - Concentration risk: are the top 3 holdings combined > 40%?
        - Sector breakdown (% weight by GICS sector or equivalent)
        - Geographic exposure (% US / Developed International / Emerging Markets)
        - Single-stock dependency: flag any single holding > 7% with:
          "WARNING: Single-stock dependency — [name] at [%]"

        ### Valuation Profile
        - Weighted portfolio P/E (aggregate P/E of holdings weighted by % allocation)
        - Sector P/E comparison: is the ETF's portfolio at a premium or discount to sector average?
        - Premium/discount vs historical ETF NAV range (if data available)

        ### Expense & Liquidity
        - Expense ratio (annual %)
        - Tracking error vs benchmark index (annualised %)
        - AUM size (in billions USD)
        - Liquidity: average daily volume (shares); note "adequate liquidity" if > 1M shares/day

        ### Flow Dynamics
        - 30-day net flows: positive = inflows, negative = outflows (in $M if available)
        - 90-day trend: accelerating / decelerating / reversing
        - Creation/redemption pressure: any signs of NAV premium or discount?

        ### ETF Structure Scores
        Rate each dimension [+1, 0, or -1] with a one-line justification:
        Structure Quality Score:  [+1 = diversified, sound methodology | 0 = adequate | -1 = concentrated or flawed]
        Expense Efficiency Score: [+1 = low cost vs peers | 0 = market rate | -1 = high cost]
        Concentration Risk Score: [+1 = well-diversified | 0 = moderate | -1 = high concentration]
        Flow Strength Score:      [+1 = strong sustained inflows | 0 = neutral | -1 = outflows or redemption pressure]

        {{- else }}
        You are a fundamental analyst. Write analytical prose under each heading.
        DO NOT echo these instructions — write your own analysis text.

        ALLOWED SUB-HEADINGS — output ONLY these, in this exact order:
        ### Revenue & Earnings → ### Margins → ### Valuation → ### Cyclical Analysis →
        ### Balance Sheet → ### Guidance & Analyst Estimates → ### Capital Allocation →
        ### Fundamental Signal
        After "### Fundamental Signal", STOP. Do NOT add any more sub-headings or content.
        FORBIDDEN: Do NOT write Competitive Landscape, Technical Signal, Investment Thesis,
        price targets, buy/sell/hold ratings, bull/bear/base cases, catalysts, risk matrices,
        conviction levels, or a "Signals At A Glance" table.

        UNIT VERIFICATION: EPS must be per-share, revenue in billions (e.g. $14.2B),
        multiples as ratios (e.g. P/E 22x). Correct mismatches before output.

        ### Revenue & Earnings
        Write the most recent quarter's revenue, EPS, YoY growth, and beat/miss vs consensus.

        ### Margins
        Write gross, operating, and net margin with YoY trend and vs sector peers.
        If both margins AND EPS are declining QoQ, add:
        "WARNING: Declining margins + declining EPS — must include forward improvement argument or downgrade rating."

        ### Valuation
        Write P/E (TTM + forward), P/B, EV/EBITDA. State premium or discount to sector.
        If claiming undervalued: compare against 5-year historical P/E range, calculate PEG ratio.
        If PEG > 2: "WARNING: PEG > 2 — valuation not compelling despite apparent discount"

        ### Cyclical Analysis
        State whether this company is cyclical. If so, state position in economic cycle
        and adjust valuation expectation accordingly.

        ### Balance Sheet
        Write debt-to-equity ratio, cash & equivalents, free cash flow yield, interest coverage ratio.

        ### Guidance & Analyst Estimates
        Write management full-year guidance and analyst consensus EPS/revenue for next quarter and full year.

        ### Capital Allocation
        Write dividend yield and payout ratio (if applicable), share buyback authorisation and history.

        ### Fundamental Signal
        MANDATORY — you MUST output this block even if most metrics are unavailable:
        **Score: [+1, 0, or -1]**
        **Signal: [UNDERVALUED / FAIRLY VALUED / OVERVALUED]** — one sentence rationale.
        Rules: +1 = UNDERVALUED, 0 = FAIRLY VALUED, -1 = OVERVALUED.
        If 3+ metrics above are [DATA UNAVAILABLE], you MUST set Score to 0 and Signal to FAIRLY VALUED
        with rationale: "Insufficient data for valuation assessment."

        DATA INTEGRITY RULES:
        - Use "[DATA UNAVAILABLE]" (this exact marker) when data is not in source snippets.
        - If both margins AND EPS are declining QoQ, include the warning and consider downgrading.
        - P/E with negative earnings: write "P/E: N/A (negative earnings)".
        - Do NOT copy financial data from search results about OTHER companies.

        ### Context Impact
        In 2-3 sentences, tie valuation sensitivity to "{{context}}".

        ### Regulatory Lens
        Summarize bill/act impact on revenue, costs, and capital needs under bull/base/bear scenarios.

        {{ end -}}
        {{ else if section_name == "Competitive Landscape" }}
        You are a competitive intelligence analyst. Write a focused competitive assessment.
        SCOPE: Write ONLY about competitive positioning using the sub-headings listed below.
        FORBIDDEN: Do NOT write about investment thesis, price targets, buy/sell/hold
        ratings, bull/bear/base cases, catalysts, risk matrices, or conviction levels.
        Do NOT output a "Signals At A Glance" table.

        ### Market Position
        Estimated market share, rank among peers, recent gains or losses.
        {{ if asset_type == "etf" -}}

        ### ETF Peer Comparison
        Compare this ETF against 2 peer ETFs tracking a similar index or strategy.
        For each peer: name, AUM, expense ratio, 1-year return differential.

        ### Index Methodology Durability
        Assess index construction rules: replication method, rebalancing frequency, constituent eligibility.
        Is the methodology robust, or are there survivorship bias or gaming risks?

        ### Sector/Thematic Thesis Quality
        How well does this ETF capture its stated sector or theme?
        Any constituent drift, index reconstitution impact, or thematic dilution?

        {{- else }}
        ### Key Competitors
        Top 3 competitors — one-line relative strength and weakness for each (name them specifically).

        ### Competitive Moat
        Rate: **WIDE / NARROW / NONE**.
        Source: brand / switching costs / network effects / cost leadership / IP / regulatory licence / distribution.

        {{ end -}}
        ### Industry Dynamics
        Two or three structural tailwinds and two or three structural headwinds active in the sector right now.

        ### Disruption & Regulatory Risk
        Emerging technologies, new entrants, or regulatory changes that could erode the moat.

        ### Context-Specific Impact
        How does "{{context}}" specifically affect {{ticker_upper}}'s competitive position?

        ### Key Risk Factors
        List the top 3 competitive risks as bullet points (not a table):
        - **[Risk name]**: [how it materialises] → affects [metric], magnitude [High/Medium/Low]

        ### Competitive Signal
        Competitive Score: [+1 = STRENGTHENING | 0 = STABLE | -1 = WEAKENING]
        **Score: [write exactly +1, 0, or -1 — no other values]**
        **Signal: STRENGTHENING / STABLE / WEAKENING** — one sentence rationale.

        ### Context Impact
        2-3 sentences on how "{{context}}" shifts moat or market share.

        ### Regulatory Lens
        Rate whether the bill/act strengthens or weakens the moat; include a "Regulatory Moat Score" [+1 / 0 / -1] with a one-line justification.

        {{ else if section_name == "Investment Thesis" }}
        You are a portfolio manager writing a structured investment thesis. Be direct — no hedging.
        Do NOT output a "Signals At A Glance" table — that is assembled separately.

        ### Summary
        What {{ticker_upper}} is and why it is worth analysing right now (2-3 sentences).
        {{ if asset_type == "etf" -}}

        ### ETF vs Equity Equivalence
        | Equity Metric      | ETF Equivalent for {{ticker_upper}}    |
        |---|---|
        | Revenue Growth     | Underlying earnings growth of holdings |
        | EPS                | Portfolio earnings yield               |
        | Margins            | Sector margin exposure                 |
        | Competitive Moat   | Index methodology durability           |
        | Buybacks           | Net flows                              |

        {{ end -}}
        ### Base / Bull / Bear Cases
        Provide a probability estimate for each case. All three must sum to 100%.

        Base Case (most likely outcome): [1-2 sentence description]
        Probability: [X%]

        Bull Case (what must go right): [1-2 sentence description]
        Probability: [X%]

        Bear Case (what must go wrong): [1-2 sentence description]
        Probability: [X%]

        ### Key Catalysts
        Two or three upcoming events, data releases, or milestones that could materially re-rate
        {{ticker_upper}} (e.g. earnings date, product launch, regulatory ruling, index rebalancing, macro data print).

        Regulatory Catalysts (if applicable):
        - Timeline and probability for the bill/act/reg change.
        - Price/volume triggers for re-rating on passage/failure.
        - Operational/fee-structure impacts across bull/base/bear scenarios.

        ### Risk Matrix
        | Risk | Mechanism | Financial Metric Affected | Magnitude |
        |---|---|---|---|
        | [Risk 1] | [how it materialises] | [metric] | HIGH / MEDIUM / LOW |
        | [Risk 2] | [how it materialises] | [metric] | HIGH / MEDIUM / LOW |
        | [Risk 3] | [how it materialises] | [metric] | HIGH / MEDIUM / LOW |

        ### Conviction
        - **Rating:** STRONG BUY / BUY / HOLD / SELL / STRONG SELL
        - **Best Horizon:** Short-term (0-3M) / Medium-term (3-12M) / Long-term (1Y+)
        - **Entry/Exit:** Ideal entry price range or specific trigger condition

        ### Confidence Level
        **Level: High / Medium / Low**
        Drivers:
        - Data freshness: [are search results current — within 30 days?]
        - Signal alignment: [are technical, fundamental, and competitive signals pointing the same direction?]
        - Competitive clarity: [how well understood is the competitive landscape from available source material?]

        ## PRE-OUTPUT CHECKLIST (internal verification — do NOT include this section in your output)
        1. Unit consistency: EPS per-share, revenue in billions, multiples as ratios
        2. Internal contradictions: is the bull case consistent with the risk matrix?
        3. Rating justified: does conviction rating match bull/base/bear probability distribution?
        4. Evidence: every numeric claim from source material or flagged as [Model Estimate]
        5. Uncertainty: explicitly stated where data is missing or ambiguous

        [Internal instruction — do not output this line] Tailor every point to the analyst's stated context: "{{context}}"
        Reference personal investment notes where relevant.

        {{ end }}

# ── Assembler subtask ─────────────────────────────────────────────────────────
# Single Claude Sonnet pass: assembles sections into a polished final report
# with an executive summary, signals table, and action items.
subtasks:
  - name: assembler
    model: '{{ if assembler_model_override != "" }}{{assembler_model_override}}{{ else }}{{model_preference.subtasks.assembler}}{{ end }}'
    input_vars: [section_analyses, personal_context]
    prompt_template: |
      You are assembling a final investment analysis report.
      Ticker: {{ticker_upper}} ({{asset_type}})
      Date: {{date}}
      Analyst context: {{context}}

      Four specialist analysts produced the sections below.
      READ THEM CAREFULLY — assemble and refine, do not rewrite or cut content.

      {{section_analyses}}

      SCORE EXTRACTION (perform before assembling):
      Scan each section for a line matching "**Score: +1**", "**Score: 0**", or "**Score: -1**".
      {{ if asset_type == "etf" -}}
      Extract: Technical Score, Structure Quality Score, Expense Efficiency Score,
               Concentration Risk Score, Flow Strength Score.
      ETF Total Score = sum of all 5 dimension scores.
      {{- else -}}
      Extract: Technical Score, Fundamental Score, Competitive Score.
      If a score line is not found for a dimension, set that score to 0.
      Total Score = Technical + Fundamental + Competitive (range: -3 to +3).

      GATE RULES (you MUST apply these — write out the check explicitly):
      Step A: Write "Total Score = [T] + [F] + [C] = [sum]" using the extracted values.
      Step B: If Total Score < +2 AND the Investment Thesis section says STRONG BUY,
              you MUST change it to BUY in your output. Add after the Signals table:
              "**Note:** Total score [sum] < +2 — STRONG BUY downgraded to BUY."
      Step C: If Fundamental Score is 0 because most metrics are [DATA UNAVAILABLE],
              cap the maximum rating at BUY regardless of total score. Add after the Signals table:
              "**Note:** Fundamental data insufficient — rating capped at BUY."
      {{ end -}}

      INTERNAL PRE-OUTPUT CHECK (do this silently — never output these instructions):
      Before writing, scan the analyst sections and silently remove: Base/Bull/Bear scenarios,
      Key Catalysts lists, Risk Matrix tables, Confidence Level blocks, or Conviction ratings
      that appear in Technical Analysis, Fundamental Analysis, or Competitive Landscape.
      Also remove any mini "Signals At A Glance" tables from individual sections.

      YOUR OUTPUT MUST be clean Markdown only — start with the title heading below and end
      with the footer. Do NOT output numbered instructions, JSON, meta-commentary, or any
      text that looks like a template. Every line of your output is the final report.

      Begin output:

      # {{ticker_upper}} — Investment Analysis ({{date}})
      > *{{context}}*

      ## Signals At A Glance
      {{ if asset_type == "etf" -}}
      Pick EXACTLY ONE signal value per row — never list alternatives with slashes:
      | Dimension | Score | Signal | One-Line Rationale |
      |---|---|---|---|
      | Technical | [+1, 0, or -1] | [pick one: BULLISH or NEUTRAL or BEARISH] | [from section] |
      | Structure Quality | [+1, 0, or -1] | [pick one: SOUND or ADEQUATE or FLAWED] | [from section] |
      | Expense Efficiency | [+1, 0, or -1] | [pick one: LOW COST or AVERAGE or HIGH COST] | [from section] |
      | Concentration Risk | [+1, 0, or -1] | [pick one: LOW or MODERATE or HIGH] | [from section] |
      | Flow Strength | [+1, 0, or -1] | [pick one: STRONG or NEUTRAL or WEAK] | [from section] |
      | Conviction | [total score] | [pick one: STRONG BUY or BUY or HOLD or SELL or STRONG SELL] | [from thesis] |
      {{- else -}}
      Pick EXACTLY ONE signal value per row — never list alternatives with slashes:
      | Dimension | Score | Signal | One-Line Rationale |
      |---|---|---|---|
      | Technical | [+1, 0, or -1] | [pick one: BULLISH or NEUTRAL or BEARISH] | [from section] |
      | Fundamental | [+1, 0, or -1] | [pick one: UNDERVALUED or FAIRLY VALUED or OVERVALUED] | [from section] |
      | Competitive | [+1, 0, or -1] | [pick one: STRENGTHENING or STABLE or WEAKENING] | [from section] |
      | Conviction | [total score] | [pick one: STRONG BUY or BUY or HOLD or SELL or STRONG SELL] | [from thesis] |
      Apply gate rules from SCORE EXTRACTION above.
      {{ end -}}

      ## Executive Summary
      3-5 sentences: the single most important insight from each analysis dimension
      and what the combined picture means for the analyst's stated context.

      ## Technical Analysis
      Copy the Technical Analysis section from above with all its sub-headings.

      ## Fundamental Analysis
      Copy the Fundamental Analysis section from above with all its sub-headings.

      ## Competitive Landscape
      Copy the Competitive Landscape section from above with all its sub-headings.

      ## Investment Thesis
      Copy the Investment Thesis section from above with all its sub-headings.
      If the rating conflicts with the gate rule, adjust per the rule and note the adjustment inline.

      ## Action Items
      3-5 numbered, concrete actions the analyst should take NOW based on this report.
      Tailor to the stated context: "{{context}}"
      If personal notes are available and relevant, reference them.

      ---
      *Report generated {{date}} by SAGIDE Research · Ticker: {{ticker_upper}} · Do your own due diligence.*

      End of output format. Personal notes: {{personal_context}}

# ── Synthesis ─────────────────────────────────────────────────────────────────
synthesis:
  prompt_template: |
    {{assembler_result}}

output:
  format: markdown
  destination: "~/reports/{{output_subdir}}/{{datestamp}}-{{ticker}}-analysis.md"
  notify: true
